services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wind_platform
      POSTGRES_USER: wind
      POSTGRES_PASSWORD: wind
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wind -d wind_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
